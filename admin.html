<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Dashboard – Chatpata Corner</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E8560A">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --or:#E8560A;--dor:#C4430A;--dark:#1A1008;--mid:#3D2B1A;--lb:#8B6343;
    --w:#fff;--border:#2e1f12;--bg:#120A04;--card:#1e1208;
    --green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--w);min-height:100vh}

  /* ════════════════════════════════════
     PIN LOCK SCREEN
  ════════════════════════════════════ */
  #lockScreen{
    position:fixed;inset:0;z-index:9999;
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  #lockScreen.gone{display:none}

  .lock-card{
    background:var(--card);
    border:1px solid var(--border);
    border-top:4px solid var(--or);
    border-radius:20px;
    padding:clamp(32px,6vw,52px) clamp(24px,5vw,44px);
    width:100%;max-width:380px;text-align:center;
    animation:popIn .45s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}

  .lock-icon{font-size:3rem;display:block;margin-bottom:16px;animation:sway 2.5s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}

  .lock-title{font-family:'Bebas Neue',cursive;font-size:clamp(1.8rem,5vw,2.4rem);color:var(--w);letter-spacing:3px;margin-bottom:5px}
  .lock-sub{font-family:'Oswald',sans-serif;font-size:.76rem;letter-spacing:2px;text-transform:uppercase;color:var(--lb);margin-bottom:30px}

  /* dots */
  .pin-dots{display:flex;gap:16px;justify-content:center;margin-bottom:28px}
  .dot{
    width:15px;height:15px;border-radius:50%;
    border:2px solid rgba(255,255,255,.18);background:transparent;
    transition:all .18s;
  }
  .dot.filled{background:var(--or);border-color:var(--or);box-shadow:0 0 10px rgba(232,86,10,.5)}
  .dot.err{background:var(--red);border-color:var(--red);animation:jiggle .4s ease}
  @keyframes jiggle{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}

  /* keypad */
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .key{
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
    border-radius:12px;padding:17px 8px;
    font-family:'Bebas Neue',cursive;font-size:1.65rem;color:var(--w);
    cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
    transition:all .14s;
  }
  .key:hover{background:rgba(232,86,10,.18);border-color:rgba(232,86,10,.5)}
  .key:active{transform:scale(.9)}
  .key-zero{grid-column:2}
  .key-del{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:var(--red);font-size:1.1rem}
  .key-del:hover{background:rgba(239,68,68,.22)}

  /* messages */
  .lock-msg{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase;min-height:22px;transition:color .2s}
  .lock-msg.err{color:var(--red)}
  .lock-msg.warn{color:var(--yellow)}
  .lock-msg.locked{color:var(--red);font-size:.82rem}

  .lock-foot{margin-top:22px;font-size:.72rem;color:rgba(255,255,255,.13);font-family:'Oswald',sans-serif;letter-spacing:1px}
  .lock-foot a{color:rgba(232,86,10,.35);text-decoration:none;transition:color .2s}
  .lock-foot a:hover{color:var(--or)}

  /* ════════════════════════════════════
     DASHBOARD  (hidden until unlocked)
  ════════════════════════════════════ */
  #dashboard{display:none}
  #dashboard.visible{display:block}

  /* NAV */
  nav{background:var(--dark);height:60px;padding:0 clamp(14px,4vw,48px);display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--or);position:sticky;top:0;z-index:100}
  .logo{font-family:'Bebas Neue',cursive;font-size:clamp(1.2rem,3vw,1.7rem);color:var(--w);letter-spacing:2px;text-decoration:none}
  .logo span{color:var(--or)}
  .nav-tag{font-family:'Oswald',sans-serif;font-size:.76rem;letter-spacing:3px;text-transform:uppercase;color:var(--or);background:rgba(232,86,10,.15);border:1px solid rgba(232,86,10,.3);padding:4px 12px;border-radius:20px}
  .nav-r{display:flex;align-items:center;gap:10px}
  .nav-home{font-family:'Oswald',sans-serif;font-size:.76rem;letter-spacing:1.5px;text-transform:uppercase;color:#777;text-decoration:none;transition:color .2s}
  .nav-home:hover{color:var(--or)}
  .lock-nav-btn{font-family:'Oswald',sans-serif;font-size:.74rem;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .lock-nav-btn:hover{background:rgba(239,68,68,.22)}

  /* WRAP */
  .wrap{max-width:1300px;margin:0 auto;padding:28px clamp(14px,4vw,40px) 60px}

  /* STATS */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;align-items:center;gap:14px}
  .stat-ico{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
  .stat-ico.orange{background:rgba(232,86,10,.18)}
  .stat-ico.green{background:rgba(34,197,94,.15)}
  .stat-ico.yellow{background:rgba(234,179,8,.15)}
  .stat-ico.blue{background:rgba(59,130,246,.15)}
  .stat-num{font-family:'Bebas Neue',cursive;font-size:2rem;line-height:1;color:var(--w)}
  .stat-lbl{font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:#666;margin-top:2px}

  /* FILTER */
  .filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;align-items:center;justify-content:space-between}
  .filter-left{display:flex;flex-wrap:wrap;gap:8px}
  .f-btn{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase;padding:8px 18px;background:var(--card);color:#888;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .f-btn.on{color:var(--w);border-color:var(--or)}
  .f-btn[data-f="all"].on{background:var(--or)}
  .f-btn[data-f="new"].on{background:#1e3a2e;border-color:var(--green);color:var(--green)}
  .f-btn[data-f="preparing"].on{background:#3a2e00;border-color:var(--yellow);color:var(--yellow)}
  .f-btn[data-f="done"].on{background:#1e2a3e;border-color:var(--blue);color:var(--blue)}
  .f-btn[data-f="cancelled"].on{background:#3a1e1e;border-color:var(--red);color:var(--red)}
  .clear-btn{font-family:'Oswald',sans-serif;font-size:.75rem;letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .clear-btn:hover{background:rgba(239,68,68,.2)}

  /* TOOLBAR */
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  .section-title{font-family:'Bebas Neue',cursive;font-size:1.6rem;letter-spacing:2px;color:var(--w)}
  .section-title span{color:var(--or);font-size:1rem;font-family:'Oswald',sans-serif;letter-spacing:1px;margin-left:8px}
  .refresh-btn{font-family:'Oswald',sans-serif;font-size:.76rem;letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;background:rgba(232,86,10,.1);color:var(--or);border:1px solid rgba(232,86,10,.3);border-radius:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
  .refresh-btn:hover{background:rgba(232,86,10,.2)}
  .refresh-ico{display:inline-block;transition:transform .4s}
  .refresh-ico.spin{transform:rotate(360deg)}

  /* ORDER CARDS */
  .orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:18px}
  .order-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
  .order-card:hover{border-color:rgba(232,86,10,.3);box-shadow:0 4px 20px rgba(0,0,0,.3)}
  .order-card[data-status="new"]      {border-left:4px solid var(--green)}
  .order-card[data-status="preparing"]{border-left:4px solid var(--yellow)}
  .order-card[data-status="done"]     {border-left:4px solid var(--blue)}
  .order-card[data-status="cancelled"]{border-left:4px solid var(--red);opacity:.6}
  .card-top{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border);gap:10px}
  .order-id{font-family:'Bebas Neue',cursive;font-size:1.25rem;color:var(--w);letter-spacing:2px}
  .order-time{font-size:.72rem;color:#555;margin-top:2px;font-family:'Oswald',sans-serif;letter-spacing:.5px}
  .status-badge{font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0}
  .sb-new      {background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
  .sb-preparing{background:rgba(234,179,8,.15);color:var(--yellow);border:1px solid rgba(234,179,8,.3)}
  .sb-done     {background:rgba(59,130,246,.15);color:var(--blue); border:1px solid rgba(59,130,246,.3)}
  .sb-cancelled{background:rgba(239,68,68,.15); color:var(--red);  border:1px solid rgba(239,68,68,.3)}
  .card-info{padding:12px 16px;border-bottom:1px solid var(--border)}
  .info-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:.84rem}
  .info-ico{width:18px;text-align:center;opacity:.45;flex-shrink:0;padding-top:1px}
  .info-label{color:#666;font-size:.72rem;min-width:52px;font-family:'Oswald',sans-serif;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
  .info-val{color:#ddd;flex:1;word-break:break-word}
  .type-badge{font-size:.7rem;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:10px}
  .type-delivery{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.25)}
  .type-pickup  {background:rgba(232,86,10,.15); color:var(--or);  border:1px solid rgba(232,86,10,.25)}
  .card-items{padding:12px 16px;border-bottom:1px solid var(--border)}
  .items-toggle{font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;color:#555;cursor:pointer;background:none;border:none;padding:0;display:flex;align-items:center;gap:5px;margin-bottom:8px;transition:color .2s}
  .items-toggle:hover{color:var(--or)}
  .items-list{display:none}
  .items-list.open{display:block}
  .item-line{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:8px}
  .item-line:last-child{border:none}
  .iname{font-family:'Oswald',sans-serif;font-size:.82rem;color:#ccc;text-transform:uppercase;flex:1}
  .iqty{font-size:.75rem;color:#555;margin-left:4px}
  .iprice{font-family:'Bebas Neue',cursive;font-size:.95rem;color:var(--or);flex-shrink:0}
  .card-totals{padding:10px 16px;background:rgba(0,0,0,.2)}
  .total-line{display:flex;justify-content:space-between;font-size:.82rem;color:#666;margin-bottom:4px}
  .grand-line{display:flex;justify-content:space-between;font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--w)}
  .grand-line span:last-child{color:var(--or)}
  .card-actions{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap}
  .act-btn{font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;padding:7px 14px;border:none;border-radius:6px;cursor:pointer;transition:all .2s;flex:1;white-space:nowrap;min-width:80px;text-align:center}
  .btn-prepare{background:rgba(234,179,8,.15);color:var(--yellow);border:1px solid rgba(234,179,8,.3)}
  .btn-prepare:hover{background:rgba(234,179,8,.3)}
  .btn-done{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
  .btn-done:hover{background:rgba(59,130,246,.3)}
  .btn-cancel{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25)}
  .btn-cancel:hover{background:rgba(239,68,68,.2)}
  .btn-new{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.25)}
  .btn-new:hover{background:rgba(34,197,94,.2)}
  .notes-box{background:rgba(232,86,10,.06);border:1px solid rgba(232,86,10,.15);border-radius:6px;padding:8px 12px;font-size:.8rem;color:#aaa;margin:0 16px 12px;font-style:italic}
  .empty-state{text-align:center;padding:80px 20px;color:#333}
  .empty-state .e-ico{font-size:3rem;margin-bottom:16px;display:block}
  .empty-state p{font-family:'Oswald',sans-serif;font-size:.85rem;letter-spacing:2px;text-transform:uppercase}
  @keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}70%{box-shadow:0 0 0 10px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .order-card[data-status="new"]{animation:pulse-ring 2s ease-out}

  /* CONFIRM MODAL */
  .conf-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:8000;align-items:center;justify-content:center;padding:16px}
  .conf-bg.show{display:flex}
  .conf-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px 28px;max-width:380px;width:100%;text-align:center;animation:pop .3s ease both}
  @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
  .conf-title{font-family:'Bebas Neue',cursive;font-size:1.6rem;color:var(--w);letter-spacing:2px;margin-bottom:8px}
  .conf-msg{color:#888;font-size:.88rem;margin-bottom:24px;line-height:1.6}
  .conf-btns{display:flex;gap:10px}
  .conf-yes{flex:1;padding:12px;background:var(--red);border:none;color:var(--w);font-family:'Bebas Neue',cursive;font-size:1.05rem;letter-spacing:2px;border-radius:7px;cursor:pointer;transition:background .2s}
  .conf-yes:hover{background:#dc2626}
  .conf-no{flex:1;padding:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#aaa;font-family:'Bebas Neue',cursive;font-size:1.05rem;letter-spacing:2px;border-radius:7px;cursor:pointer}
  .conf-no:hover{background:rgba(255,255,255,.12)}

  /* TOAST */
  .toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--card);border:1px solid var(--border);color:var(--w);font-family:'Oswald',sans-serif;font-size:.84rem;letter-spacing:1px;padding:10px 20px;border-radius:8px;opacity:0;transform:translateX(40px);transition:all .3s;pointer-events:none;max-width:280px}
  .toast.show{opacity:1;transform:translateX(0)}

  /* RESPONSIVE */
  @media(max-width:900px){.stats-bar{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){
    .stats-bar{grid-template-columns:repeat(2,1fr);gap:10px}
    .stat-card{padding:14px}.stat-num{font-size:1.6rem}
    .filter-bar,.toolbar{flex-direction:column;align-items:flex-start}
    .nav-tag{display:none}
  }
  @media(max-width:380px){.stats-bar{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ════════════════════════════════════
     PIN LOCK SCREEN
════════════════════════════════════ -->
<div id="lockScreen">
  <div class="lock-card">
    <span class="lock-icon">&#128274;</span>
    <div class="lock-title">Kitchen Access</div>
    <div class="lock-sub">Enter your 4-digit PIN</div>

    <div class="pin-dots" id="pinDots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>

    <div class="keypad">
      <div class="key" data-k="1">1</div>
      <div class="key" data-k="2">2</div>
      <div class="key" data-k="3">3</div>
      <div class="key" data-k="4">4</div>
      <div class="key" data-k="5">5</div>
      <div class="key" data-k="6">6</div>
      <div class="key" data-k="7">7</div>
      <div class="key" data-k="8">8</div>
      <div class="key" data-k="9">9</div>
      <div class="key key-zero" data-k="0">0</div>
      <div class="key key-del" id="delKey">&#9003;</div>
    </div>

    <div class="lock-msg" id="lockMsg">&nbsp;</div>
    <div class="lock-foot"><a href="index.html">&#8592; Back to website</a></div>
  </div>
</div>

<!-- ════════════════════════════════════
     DASHBOARD
════════════════════════════════════ -->
<div id="dashboard">

  <nav>
    <a href="index.html" class="logo">Chatpata <span>Corner</span></a>
    <div class="nav-r">
      <span class="nav-tag">&#128274; Kitchen Dashboard</span>
      <a href="index.html" class="nav-home">&#8592; Site</a>
      <button class="lock-nav-btn" onclick="doLock()">&#128274; Lock</button>
    </div>
  </nav>

  <div class="wrap">
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-ico orange">&#128722;</div><div><div class="stat-num" id="sTotal">0</div><div class="stat-lbl">Total Orders</div></div></div>
      <div class="stat-card"><div class="stat-ico green">&#9679;</div><div><div class="stat-num" id="sNew">0</div><div class="stat-lbl">New</div></div></div>
      <div class="stat-card"><div class="stat-ico yellow">&#9679;</div><div><div class="stat-num" id="sPreparing">0</div><div class="stat-lbl">Preparing</div></div></div>
      <div class="stat-card"><div class="stat-ico blue">&#9679;</div><div><div class="stat-num" id="sDone">0</div><div class="stat-lbl">Completed</div></div></div>
    </div>

    <div class="filter-bar">
      <div class="filter-left">
        <button class="f-btn on" data-f="all"      onclick="setFilter('all',this)">All</button>
        <button class="f-btn"    data-f="new"       onclick="setFilter('new',this)">New</button>
        <button class="f-btn"    data-f="preparing" onclick="setFilter('preparing',this)">Preparing</button>
        <button class="f-btn"    data-f="done"      onclick="setFilter('done',this)">Done</button>
        <button class="f-btn"    data-f="cancelled" onclick="setFilter('cancelled',this)">Cancelled</button>
      </div>
      <button class="clear-btn" onclick="confirmClear()">Clear All Orders</button>
    </div>

    <div class="toolbar">
      <div class="section-title">Orders <span id="countLabel">0 orders</span></div>
      <button class="refresh-btn" onclick="doRefresh()">
        <span class="refresh-ico" id="refreshIco">&#8635;</span> Refresh
      </button>
    </div>

    <div class="orders-grid" id="ordersGrid"></div>
  </div>
</div>

<!-- Confirm Clear Modal -->
<div class="conf-bg" id="confBg">
  <div class="conf-box">
    <div class="conf-title">Clear All Orders?</div>
    <div class="conf-msg">This permanently deletes all order history. Cannot be undone.</div>
    <div class="conf-btns">
      <button class="conf-yes" onclick="clearAll()">Yes, Clear</button>
      <button class="conf-no"  onclick="document.getElementById('confBg').classList.remove('show')">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   SECURITY CONFIG  —  change PIN here
══════════════════════════════════════════ */
const PIN          = '2580';       // ← your kitchen PIN
const MAX_FAILS    = 5;            // wrong attempts before lockout
const LOCKOUT_MIN  = 5;            // lockout duration in minutes
const S_AUTH       = 'cc_auth';    // sessionStorage key
const L_FAILS      = 'cc_fails';   // localStorage fail count
const L_UNTIL      = 'cc_until';   // localStorage lockout timestamp

/* ══════════════════════════════════════════
   PIN LOCK LOGIC
══════════════════════════════════════════ */
let buf = '';

const $ = id => document.getElementById(id);

function isAuthed()   { return sessionStorage.getItem(S_AUTH) === '1'; }
function isLocked()   { return Date.now() < parseInt(localStorage.getItem(L_UNTIL)||'0'); }
function lockSecs()   { return Math.max(0, Math.ceil((parseInt(localStorage.getItem(L_UNTIL)||'0') - Date.now())/1000)); }

function syncDots(state){
  // state: 'normal' | 'error'
  for(let i=0;i<4;i++){
    const d = $('d'+i);
    d.className = 'dot' + (i < buf.length ? (state==='error'?' err':' filled') : '');
  }
}

function clearMsg(){ $('lockMsg').textContent='\u00a0'; $('lockMsg').className='lock-msg'; }

function showMsg(text, type){
  const el=$('lockMsg');
  el.textContent=text; el.className='lock-msg '+type;
}

function pressKey(digit){
  if(isLocked()){ renderLockout(); return; }
  if(buf.length>=4) return;
  buf += digit;
  syncDots('normal');
  if(buf.length===4) setTimeout(verify, 140);
}

function pressDelete(){
  if(isLocked()) return;
  buf = buf.slice(0,-1);
  syncDots('normal');
  clearMsg();
}

function verify(){
  if(buf === PIN){
    // ✓ correct
    syncDots('normal');
    localStorage.setItem(L_FAILS,'0');
    localStorage.removeItem(L_UNTIL);
    setTimeout(openDashboard, 250);
  } else {
    // ✗ wrong
    let fails = parseInt(localStorage.getItem(L_FAILS)||'0') + 1;
    localStorage.setItem(L_FAILS, fails);
    syncDots('error');
    setTimeout(()=>{ buf=''; syncDots('normal'); },500);

    if(fails >= MAX_FAILS){
      const until = Date.now() + LOCKOUT_MIN*60*1000;
      localStorage.setItem(L_UNTIL, until);
      localStorage.setItem(L_FAILS,'0');
      renderLockout();
    } else {
      const left = MAX_FAILS - fails;
      showMsg(
        left===1 ? 'Wrong PIN — 1 attempt left!' : `Wrong PIN — ${left} attempts left`,
        left<=2 ? 'warn' : 'err'
      );
    }
  }
}

function renderLockout(){
  const s=lockSecs(), m=Math.floor(s/60), sec=s%60;
  showMsg(`Too many attempts. Try again in ${m}m ${sec}s`,'locked');
}

/* countdown ticker while locked */
setInterval(()=>{
  if(!isLocked() || isAuthed()) return;
  const s=lockSecs();
  if(s<=0){ clearMsg(); return; }
  const m=Math.floor(s/60),sec=s%60;
  showMsg(`Too many attempts. Try again in ${m}m ${sec}s`,'locked');
},1000);

/* ── keypad clicks ── */
document.querySelector('.keypad').addEventListener('click', e=>{
  const k = e.target.closest('.key');
  if(!k) return;
  if(k.id==='delKey'){ pressDelete(); return; }
  if(k.dataset.k!==undefined) pressKey(k.dataset.k);
});

/* ── physical keyboard ── */
document.addEventListener('keydown', e=>{
  if(isAuthed()) return;
  if(e.key>='0' && e.key<='9') pressKey(e.key);
  if(e.key==='Backspace'||e.key==='Delete') pressDelete();
});

/* ── open dashboard ── */
function openDashboard(){
  sessionStorage.setItem(S_AUTH,'1');
  $('lockScreen').classList.add('gone');
  $('dashboard').classList.add('visible');
  loadOrders(); updateStats(); renderOrders();
  startAutoRefresh();
}

/* ── lock / logout ── */
function doLock(){
  sessionStorage.removeItem(S_AUTH);
  buf=''; syncDots('normal'); clearMsg();
  $('lockScreen').classList.remove('gone');
  $('dashboard').classList.remove('visible');
  stopAutoRefresh();
}

/* ── on page load ── */
if(isAuthed()){
  openDashboard();
} else if(isLocked()){
  renderLockout();
}


/* ══════════════════════════════════════════
   DASHBOARD LOGIC
══════════════════════════════════════════ */
let orders=[], activeFilter='all', autoTimer=null;

function startAutoRefresh(){ autoTimer=setInterval(()=>{loadOrders();updateStats();renderOrders();},30000); }
function stopAutoRefresh()  { clearInterval(autoTimer); }

function loadOrders(){
  try{ orders=JSON.parse(localStorage.getItem('cc_orders')||'[]'); }
  catch{ orders=[]; }
}

function updateStats(){
  $('sTotal').textContent     = orders.length;
  $('sNew').textContent       = orders.filter(o=>(o.status||'new')==='new').length;
  $('sPreparing').textContent = orders.filter(o=>o.status==='preparing').length;
  $('sDone').textContent      = orders.filter(o=>o.status==='done').length;
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderOrders();
}

function fmtTime(ts){
  if(!ts) return '–';
  const d=new Date(ts), now=new Date(), diff=Math.floor((now-d)/60000);
  if(diff<1)    return 'Just now';
  if(diff<60)   return diff+'m ago';
  if(diff<1440) return Math.floor(diff/60)+'h '+diff%60+'m ago';
  return d.toLocaleDateString('en-PK',{day:'numeric',month:'short'});
}

function renderOrders(){
  const grid=$('ordersGrid');
  const list=activeFilter==='all'?orders:orders.filter(o=>(o.status||'new')===activeFilter);
  $('countLabel').textContent=list.length===1?'1 order':list.length+' orders';

  if(!list.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <span class="e-ico">&#128722;</span>
      <p>${activeFilter==='all'?'No orders yet':'No '+activeFilter+' orders'}</p></div>`;
    return;
  }

  grid.innerHTML=list.map(o=>{
    const st=o.status||'new';
    const sub=o.subtotal||o.items?.reduce((s,i)=>s+(i.price*i.qty),0)||0;
    const tot=o.total||sub+100;
    const itHtml=o.items?.map(i=>`<div class="item-line"><span class="iname">${i.name}<span class="iqty"> x${i.qty}</span></span><span class="iprice">Rs ${(i.price*i.qty).toLocaleString()}</span></div>`).join('')||'';

    const acts=()=>{
      if(st==='new')       return `<button class="act-btn btn-prepare" onclick="updSt('${o.id}','preparing')">Preparing</button><button class="act-btn btn-cancel" onclick="updSt('${o.id}','cancelled')">Cancel</button>`;
      if(st==='preparing') return `<button class="act-btn btn-done"    onclick="updSt('${o.id}','done')">Mark Done</button><button class="act-btn btn-cancel" onclick="updSt('${o.id}','cancelled')">Cancel</button>`;
      if(st==='done')      return `<button class="act-btn btn-new"     onclick="updSt('${o.id}','new')">Reopen</button>`;
      if(st==='cancelled') return `<button class="act-btn btn-new"     onclick="updSt('${o.id}','new')">Restore</button>`;
      return '';
    };

    return `<div class="order-card" data-status="${st}">
      <div class="card-top">
        <div><div class="order-id">#${o.id}</div><div class="order-time">${fmtTime(o.ts)}</div></div>
        <span class="status-badge sb-${st}">${st[0].toUpperCase()+st.slice(1)}</span>
      </div>
      <div class="card-info">
        <div class="info-row"><span class="info-ico">&#128100;</span><span class="info-label">Name</span><span class="info-val">${o.name||'–'}</span></div>
        <div class="info-row"><span class="info-ico">&#128222;</span><span class="info-label">Phone</span><span class="info-val"><a href="tel:${o.phone}" style="color:var(--or);text-decoration:none">${o.phone||'–'}</a></span></div>
        <div class="info-row"><span class="info-ico">&#128652;</span><span class="info-label">Type</span><span class="info-val"><span class="type-badge type-${o.type||'delivery'}">${o.type==='pickup'?'Pickup':'Delivery'}</span></span></div>
        ${o.addr?`<div class="info-row"><span class="info-ico">&#128205;</span><span class="info-label">Address</span><span class="info-val">${o.addr}</span></div>`:''}
      </div>
      <div class="card-items">
        <button class="items-toggle" onclick="togItems(this)">&#9660; ${o.items?.length||0} item${(o.items?.length||0)===1?'':'s'}</button>
        <div class="items-list">${itHtml}</div>
      </div>
      <div class="card-totals">
        <div class="total-line"><span>Subtotal</span><span>Rs ${sub.toLocaleString()}</span></div>
        <div class="total-line"><span>Delivery</span><span>Rs 100</span></div>
        <div class="grand-line"><span>Total</span><span>Rs ${tot.toLocaleString()}</span></div>
      </div>
      ${o.notes?`<div class="notes-box">&#128221; ${o.notes}</div>`:''}
      <div class="card-actions">${acts()}</div>
    </div>`;
  }).join('');
}

function togItems(btn){
  const list=btn.nextElementSibling;
  list.classList.toggle('open');
  btn.textContent=(list.classList.contains('open')?'▲':'▼')+btn.textContent.slice(1);
}

function updSt(id,status){
  const i=orders.findIndex(o=>o.id===id); if(i===-1) return;
  orders[i].status=status;
  try{localStorage.setItem('cc_orders',JSON.stringify(orders));}catch{}
  updateStats(); renderOrders();
  const lbl={new:'Marked New',preparing:'Now Preparing',done:'Order Done',cancelled:'Order Cancelled'};
  showToast(lbl[status]||'Updated');
}

function confirmClear(){ $('confBg').classList.add('show'); }
function clearAll(){
  orders=[];
  try{localStorage.setItem('cc_orders','[]');}catch{}
  updateStats(); renderOrders();
  $('confBg').classList.remove('show');
  showToast('All orders cleared');
}
$('confBg').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')});

function doRefresh(){
  const ico=$('refreshIco'); ico.classList.add('spin');
  loadOrders(); updateStats(); renderOrders();
  setTimeout(()=>ico.classList.remove('spin'),420);
  showToast('Orders refreshed');
}

function showToast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
